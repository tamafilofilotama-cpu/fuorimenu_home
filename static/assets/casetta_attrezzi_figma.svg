<svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" style="display: block;" viewBox="0 0 166.747 180.446" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
#Group,
#Group_2,
#Group_3,
#Group_5 {
  transform-box: fill-box;
  transform-origin: center bottom;
  animation: toolHintWiggle 1.9s cubic-bezier(0.45, 0, 0.2, 1) infinite;
}

#Group_2 {
  animation-delay: 0.16s;
}

#Group_3 {
  animation-delay: 0.32s;
}

#Group_5 {
  animation-delay: 0.48s;
}

svg:hover #Group {
  animation: toolImpactLeft 720ms cubic-bezier(0.16, 1, 0.3, 1) 100ms both;
}

svg:hover #Group_2 {
  animation: toolImpactRight 720ms cubic-bezier(0.16, 1, 0.3, 1) 88ms both;
}

svg:hover #Group_3 {
  animation: toolImpactCenter 720ms cubic-bezier(0.16, 1, 0.3, 1) 118ms both;
}

svg:hover #Group_5 {
  animation: toolImpactLoose 720ms cubic-bezier(0.16, 1, 0.3, 1) 134ms both;
}

@keyframes toolHintWiggle {
  0%,
  48%,
  100% {
    transform: translateY(0) rotate(0deg);
  }

  58% {
    transform: translateY(-3px) rotate(-2deg);
  }

  68% {
    transform: translateY(1px) rotate(1.4deg);
  }

  78% {
    transform: translateY(-1px) rotate(-0.8deg);
  }

  88% {
    transform: translateY(0) rotate(0deg);
  }
}

@keyframes toolImpactLeft {
  0%,
  34% {
    transform: translate(0, 0) rotate(0deg);
  }

  48% {
    transform: translate(-3px, -6px) rotate(-4deg);
  }

  58% {
    transform: translate(4px, 3px) rotate(5deg);
  }

  68% {
    transform: translate(-2px, -2px) rotate(-2.4deg);
  }

  80% {
    transform: translate(1px, 1px) rotate(1.2deg);
  }

  100% {
    transform: translate(0, 0) rotate(0deg);
  }
}

@keyframes toolImpactRight {
  0%,
  32% {
    transform: translate(0, 0) rotate(0deg);
  }

  47% {
    transform: translate(4px, -8px) rotate(3.8deg);
  }

  57% {
    transform: translate(-5px, 4px) rotate(-5.4deg);
  }

  68% {
    transform: translate(2px, -2px) rotate(2.2deg);
  }

  82% {
    transform: translate(-1px, 1px) rotate(-1deg);
  }

  100% {
    transform: translate(0, 0) rotate(0deg);
  }
}

@keyframes toolImpactCenter {
  0%,
  36% {
    transform: translate(0, 0) rotate(0deg);
  }

  50% {
    transform: translate(1px, -7px) rotate(2.8deg);
  }

  60% {
    transform: translate(-3px, 4px) rotate(-3.6deg);
  }

  70% {
    transform: translate(2px, -1px) rotate(1.6deg);
  }

  84% {
    transform: translate(-1px, 0) rotate(-0.8deg);
  }

  100% {
    transform: translate(0, 0) rotate(0deg);
  }
}

@keyframes toolImpactLoose {
  0%,
  30% {
    transform: translate(0, 0) rotate(0deg);
  }

  46% {
    transform: translate(-2px, -9px) rotate(-5deg);
  }

  56% {
    transform: translate(5px, 5px) rotate(5.8deg);
  }

  67% {
    transform: translate(-3px, -2px) rotate(-2.6deg);
  }

  81% {
    transform: translate(1px, 1px) rotate(1.2deg);
  }

  100% {
    transform: translate(0, 0) rotate(0deg);
  }
}

@media (prefers-reduced-motion: reduce) {
  #Group,
  #Group_2,
  #Group_3,
  #Group_5 {
    animation: none;
  }
}
</style>
